name: HealBot CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npm install
      - name: Run tests
        id: run_tests
        run: |
          npm test 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: Set status
        id: status
        run: |
          if [ "${{ steps.run_tests.outputs.exit_code }}" -eq 0 ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi
      - name: Send to HealBot
        if: always()
        env:
          HEALBOT_WEBHOOK_URL: ${{ secrets.HEALBOT_WEBHOOK_URL }}
        run: |
          LOG=$(cat test-output.txt)
          jq -n \
            --arg status "${{ steps.status.outputs.result }}" \
            --arg log "$LOG" \
            --arg commit "$(echo ${{ github.sha }} | cut -c1-7)" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg repo "${{ github.repository }}" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{status:$status,error_log:$log,commit:$commit,branch:$branch,actor:$actor,repo:$repo,timestamp:$timestamp}' \
          | curl -s -X POST "$HEALBOT_WEBHOOK_URL" \
            -H "Content-Type: application/json" -d @-
      - name: Fail if tests failed
        if: steps.status.outputs.result == 'failure'
        run: exit 1